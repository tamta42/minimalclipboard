name = "zanile-clipboard"
main = "src/index.ts"
compatibility_date = "2024-05-12"

[[kv_namespaces]]
binding = "NOTES"
id = "3b182a755a0048bf834a600e8cd7f971"
preview_id = "8a6ed224993946a6b9b98099860a9973"

[[d1_databases]]
binding = "DB"
database_name = "zanile-auth"
database_id = "4f344ad6-a3a2-48c4-aa12-576c383bfe88"

# To use a custom domain in your zone, uncomment and set your zone
# routes = [
#   { pattern = "zanile.com/*", zone_name = "zanile.com" }
# ]

[vars]
DEFAULT_TTL_SECONDS = 604800 # 7 days — no forever option
MAX_BYTES = 100000
ENVIRONMENT = "production"

# Burst guards (native limiter only supports 10s/60s). Hourly/daily fair-use uses D1.
[[ratelimits]]
name = "WRITE_RATE_LIMITER"
namespace_id = "1001"
[ratelimits.simple]
limit = 10
period = 60

[[ratelimits]]
name = "USER_WRITE_RATE_LIMITER"
namespace_id = "1003"
[ratelimits.simple]
limit = 30
period = 60

[[ratelimits]]
name = "READ_RATE_LIMITER"
namespace_id = "1004"
[ratelimits.simple]
limit = 120
period = 60

[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1002"
[ratelimits.simple]
limit = 5
period = 60

[[analytics_engine_datasets]]
binding = "TRAFFIC"
dataset = "clipboard_traffic"

[triggers]
crons = ["0 * * * *"] # hourly: delete expired D1 paste metadata (+ KV keys)

[observability.logs]
enabled = true

[[send_email]]
name = "EMAIL"

# Secrets via wrangler secret put:
# AUTH_COOKIE_SECRET
# OTP email: Cloudflare Email Sending binding (EMAIL). Onboard zanile.com under
# Email Service → Email Sending in the dashboard. RESEND_API_KEY can be removed.
